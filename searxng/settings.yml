# SearXNG settings override for ArisuAgentIntegration.
# Mounted into the container at /etc/searxng/settings.yml by start.bat / start.sh.
# `use_default_settings: true` keeps the base config; we override below.
use_default_settings: true

server:
  base_url: http://localhost:8888/
  limiter: false
  image_proxy: true
  secret_key: "arisu-searxng-secret-2026"

search:
  safe_search: 0
  formats:
    - html
    - json

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0

# Disable engines that are blocked by GFW (causes zero-result aggregation
# failures when too many engines error out simultaneously). Bing is the
# only major general-search engine reliably accessible from China without
# a proxy. When a proxy is configured (see outgoing.proxies), re-enable
# these by setting disabled: false.
engines:
  - name: google
    disabled: true
  - name: duckduckgo
    disabled: true
  - name: brave
    disabled: true
  - name: startpage
    disabled: true
  - name: wikipedia
    disabled: true
  - name: wikidata
    disabled: true
  - name: bing
    disabled: false
